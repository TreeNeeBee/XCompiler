name: Release

# 触发条件：推送形如 v0.1.0 / v1.2.3-beta1 的 tag。
# 流水线职责：
#   1. checkout 该 tag
#   2. 装 Node 24 + pnpm/npm 依赖
#   3. 跑 vitest + tsc 作为发版门
#   4. 跨平台打 4 个 pkg 产物（linux-x64 / linux-arm64 / macos-arm64 / win-x64）
#   5. 算 SHA256SUMS
#   6. 从 git tag annotation（优先）/ commit message（回退）抽取 RELEASE_NOTES
#   7. 调 softprops/action-gh-release 创建 GitHub Release，上传全部产物
#
# 注：二进制产物**不入版本库**，分发完全走 GitHub Releases；本地 release/ 目录
# 已在 .gitignore 中忽略，仅作为打包脚本的本地输出位置。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 创建 release / 上传 asset 必需
  id-token: write   # npm trusted publishing / provenance 必需

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # 需要完整历史以便 git tag -l --format / git log 抽 notes

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Verify release version
        run: |
          npm run version:check
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test (vitest)
        run: npx vitest run

      - name: Package all targets (linux-x64 / linux-arm64 / macos-arm64 / win-x64)
        run: npm run package:all

      - name: Verify SHA256SUMS
        working-directory: dist/pkg
        run: sha256sum --check SHA256SUMS

      - name: Extract release notes (commits between prev tag → this tag, or README excerpt for first release)
        id: notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # 取上一个 v 开头的 tag（按 creatordate 倒序，跳过当前 tag）
          PREV_TAG="$(git tag --list 'v*' --sort=-creatordate | grep -v "^${TAG}$" | head -n1 || true)"

          {
            echo "# XCompiler ${TAG}"
            echo
            if [ -n "${PREV_TAG}" ]; then
              echo "## Changes since ${PREV_TAG}"
              echo
              # 仅取 commit subject（首行），过滤合并提交，按时间正序展示
              git log --no-merges --reverse --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG}"
              echo
            else
              echo "## About"
              echo
              # 首次发版：从 README.md 摘录项目说明（取首个 H1 之后到下一个 H2 之前的内容）。
              # 若 README 不存在则给出空 about。
              if [ -f README.md ]; then
                awk '
                  /^# / { if (++h1 == 1) { skip_first_h1 = 1; next } }
                  skip_first_h1 && /^## / { exit }
                  skip_first_h1 { print }
                ' README.md
              else
                echo "_(no README.md found; see repo for details)_"
              fi
              echo
            fi
            echo
            echo "## Artifacts"
            echo
            echo "| File | Size | Target |"
            echo "|---|---|---|"
            (
              cd dist/pkg
              for f in xcompiler-*.tar.gz xcompiler-*.zip; do
                size=$(du -h "$f" | cut -f1)
                target="${f#xcompiler-}"; target="${target%.tar.gz}"; target="${target%.zip}"
                echo "| \`$f\` | $size | $target |"
              done
            )
            echo
            echo "校验和见同 release 的 \`SHA256SUMS\` asset。"
          } > RELEASE_BODY.md
          echo "notes_file=$PWD/RELEASE_BODY.md" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          echo '--- preview ---'
          cat RELEASE_BODY.md

      - name: Create GitHub Release & upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: XCompiler ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          # 含 - 视为 prerelease（v0.1.0-rc1 / v1.0.0-beta 等）；正式版去掉 -
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/pkg/xcompiler-linux-x64.tar.gz
            dist/pkg/xcompiler-linux-arm64.tar.gz
            dist/pkg/xcompiler-macos-arm64.tar.gz
            dist/pkg/xcompiler-win-x64.zip
            dist/pkg/SHA256SUMS

  npm-publish:
    name: Publish npm package
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install deps
        run: npm ci

      - name: Verify release version
        run: |
          npm run version:check
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build npm package
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Publish to npm with trusted publishing
        id: trusted_publish
        continue-on-error: true
        run: npm publish --provenance --access public

      - name: Publish to npm with token fallback
        if: steps.trusted_publish.outcome == 'failure'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Trusted publishing failed and NPM_TOKEN is not configured." >&2
            exit 1
          fi
          npm publish --access public

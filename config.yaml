locale: zh  # CLI / prompt 语言：en 或 zh

llm:
  # 默认使用本地 ollama 上的 coder 模型
  default: ollama_code
  providers:
    # 设计/需求向：gemma4:31b（推理与结构化输出更稳）
    ollama_design:
      base_url: ${OLLAMA_BASE_URL}
      model: gemma4:31b
    # 编码/测试/调试向：qwen3-coder:30b
    ollama_code:
      base_url: ${OLLAMA_BASE_URL}
      model: qwen3-coder:30b
    # 备用：OpenAI 兼容
    openai:
      api_key: ${OPENAI_API_KEY}
      base_url: ${OPENAI_BASE_URL}
      model: gpt-4o-mini

  # 角色 → provider 数组（兼容单字符串）。按 ScoreStore 评分降序使用，评分=0 自动跳过。
  # 启动期 preflight 会探活 ollama /api/tags 并把缺失模型置 0，必要时自动从可达服务器拉模型。
  roles:
    Planner:   [ollama_design]
    Architect: [ollama_design]
    Coder:     [ollama_code, ollama_design]
    Tester:    [ollama_code, ollama_design]
    Debugger:  [ollama_code, ollama_design]

  # 评分快照（preflight + 运行时自动维护到同目录的 llm_scores.yaml）。
  scores: {}

  # 全局 fallback 链：当主 provider 报错时依次尝试。
  # 默认为空 — 如需在 ollama 不可用时退到 OpenAI，可设为 [openai]。
  fallbacks: []
  # （旧字段，保留兼容）按角色定制 fallback 链：若设置则覆盖 roles[role]。
  # 推荐改为直接在 roles[role] 写多元素数组并依赖 ScoreStore 排序。
  role_fallbacks: {}

agent:
  language: python
  max_steps: 50
  max_debug_retries: 3
  # 默认使用 subprocess：在实际工程目录直接 spawn，轻量、无需 docker。
  # 如需隔离，设为 docker（宿主机必须能访问 /var/run/docker.sock、安装 docker CLI，且 XCompiler 未运行在容器内）。
  sandbox: subprocess
  sandbox_limits:
    cpu: 1
    memory_mb: 1024
    wall_seconds: 60
    network: pypi-only
  sandbox_docker:
    image: python:3.11-slim
    workdir: /workspace
    pull: false               # 如需拉取最新镜像设为 true
    docker_bin: docker
    extra_run_args: []        # 高级用户可追加 -u / extra mount 等

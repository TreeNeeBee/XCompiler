<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">XCompiler iterative V-model pipeline</title>
  <desc id="desc">A phase iteration plan expands one active phase into a V-model workflow, then uses test gates and issue routing to continue, debug, or advance to the next phase.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .section-title { font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0; }
      .label { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 600 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .phase { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 12; }
      .future { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 12; }
      .left { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; rx: 12; }
      .code { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; rx: 12; }
      .right { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 12; }
      .gate { fill: #fffbeb; stroke: #d97706; stroke-width: 1.5; rx: 12; }
      .issue { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; rx: 12; }
      .debug { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 12; }
      .line { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .flow { fill: none; stroke: #2563eb; stroke-width: 2.4; marker-end: url(#arrow-blue); }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 7 7; }
      .fail { fill: none; stroke: #dc2626; stroke-width: 2.2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1280" height="820"/>
  <text class="title" x="640" y="48" text-anchor="middle">Iterative V-Model Pipeline</text>
  <text class="subtitle" x="640" y="76" text-anchor="middle">Phase planning stays high level; only the active phase expands into a full V-model implementation cycle.</text>

  <rect class="panel" x="42" y="105" width="1196" height="126"/>
  <text class="section-title" x="72" y="137">Phase iteration planning</text>
  <rect class="future" x="70" y="158" width="168" height="48"/>
  <text class="label" x="154" y="178" text-anchor="middle">Requirement</text>
  <text class="small" x="154" y="196" text-anchor="middle">natural language</text>

  <rect class="future" x="285" y="158" width="168" height="48"/>
  <text class="label" x="369" y="178" text-anchor="middle">Clarify</text>
  <text class="small" x="369" y="196" text-anchor="middle">2-5 choices / QA</text>

  <rect class="phase" x="500" y="150" width="184" height="64"/>
  <text class="label" x="592" y="175" text-anchor="middle">phasePlan.json</text>
  <text class="small" x="592" y="194" text-anchor="middle">P1 current, P2..Pn goals</text>

  <rect class="phase" x="732" y="150" width="170" height="64"/>
  <text class="label" x="817" y="175" text-anchor="middle">plan.P1.json</text>
  <text class="small" x="817" y="194" text-anchor="middle">active phase detail</text>

  <rect class="future" x="948" y="150" width="220" height="64"/>
  <text class="label" x="1058" y="175" text-anchor="middle">Future phases</text>
  <text class="small" x="1058" y="194" text-anchor="middle">expanded after each gate</text>

  <path class="line" d="M238 182 L285 182"/>
  <path class="line" d="M453 182 L500 182"/>
  <path class="line" d="M684 182 L732 182"/>
  <path class="line" d="M902 182 L948 182"/>

  <rect class="panel" x="42" y="260" width="1196" height="510"/>
  <text class="section-title" x="72" y="294">Active phase V-model cycle</text>
  <text class="tiny" x="926" y="294">Dashed links are test expectations generated by earlier design stages.</text>

  <rect class="left" x="78" y="340" width="190" height="68"/>
  <text class="label" x="173" y="365" text-anchor="middle">1. Requirement</text>
  <text class="small" x="173" y="385" text-anchor="middle">analysis</text>

  <rect class="left" x="220" y="462" width="200" height="72"/>
  <text class="label" x="320" y="487" text-anchor="middle">2. High-level</text>
  <text class="small" x="320" y="507" text-anchor="middle">interfaces, APIs, deps</text>

  <rect class="left" x="368" y="585" width="200" height="72"/>
  <text class="label" x="468" y="610" text-anchor="middle">3. Detailed</text>
  <text class="small" x="468" y="630" text-anchor="middle">module internals</text>

  <rect class="code" x="590" y="660" width="164" height="62"/>
  <text class="label" x="672" y="686" text-anchor="middle">4. Coding</text>
  <text class="small" x="672" y="706" text-anchor="middle">patch / rewrite</text>

  <rect class="right" x="808" y="585" width="176" height="72"/>
  <text class="label" x="896" y="610" text-anchor="middle">5. Unit test</text>
  <text class="small" x="896" y="630" text-anchor="middle">implementation checks</text>

  <rect class="right" x="940" y="462" width="200" height="72"/>
  <text class="label" x="1040" y="487" text-anchor="middle">6. Integration</text>
  <text class="small" x="1040" y="507" text-anchor="middle">dependencies, APIs</text>

  <rect class="right" x="990" y="340" width="190" height="68"/>
  <text class="label" x="1085" y="365" text-anchor="middle">7. Module test</text>
  <text class="small" x="1085" y="385" text-anchor="middle">module contract</text>

  <rect class="right" x="782" y="340" width="178" height="68"/>
  <text class="label" x="871" y="365" text-anchor="middle">8. Functional</text>
  <text class="small" x="871" y="385" text-anchor="middle">user acceptance</text>

  <path class="flow" d="M268 374 C302 404, 280 425, 220 462"/>
  <path class="flow" d="M420 498 C455 535, 430 552, 368 585"/>
  <path class="flow" d="M568 621 C606 642, 613 652, 590 660"/>
  <path class="flow" d="M754 691 C790 669, 802 647, 808 621"/>
  <path class="flow" d="M984 621 C1036 584, 1048 552, 1040 534"/>
  <path class="flow" d="M1085 462 L1085 408"/>
  <path class="flow" d="M990 374 L960 374"/>

  <path class="dash" d="M268 374 C420 292, 650 292, 782 374"/>
  <path class="dash" d="M420 498 C575 425, 790 425, 940 498"/>
  <path class="dash" d="M568 621 C640 560, 730 560, 808 621"/>

  <rect class="gate" x="850" y="682" width="166" height="58"/>
  <text class="label" x="933" y="705" text-anchor="middle">Iteration gate</text>
  <text class="small" x="933" y="724" text-anchor="middle">all checks pass?</text>

  <rect class="future" x="1060" y="680" width="132" height="62"/>
  <text class="label" x="1126" y="705" text-anchor="middle">Pass</text>
  <text class="small" x="1126" y="724" text-anchor="middle">next phase / done</text>

  <rect class="issue" x="914" y="570" width="176" height="58"/>
  <text class="label" x="1002" y="593" text-anchor="middle">Issue record</text>
  <text class="small" x="1002" y="612" text-anchor="middle">stage, logs, artifacts</text>

  <rect class="debug" x="612" y="548" width="160" height="62"/>
  <text class="label" x="692" y="572" text-anchor="middle">Debugger</text>
  <text class="small" x="692" y="591" text-anchor="middle">patch / rewrite</text>

  <path class="line" d="M933 682 L933 657"/>
  <path class="line" d="M1016 711 L1060 711"/>
  <path class="fail" d="M930 682 C930 650, 950 635, 980 628"/>
  <path class="fail" d="M914 599 L772 579"/>
  <path class="fail" d="M692 610 C665 632, 660 646, 672 660"/>

  <text class="tiny" x="1082" y="667" text-anchor="middle">advance</text>
  <text class="tiny" x="836" y="566" text-anchor="middle">route to paired source stage</text>
</svg>

locale: zh  # CLI / prompt 语言：en 或 zh

llm:
  # Default: OpenRouter Free mode through an OpenAI-compatible /v1 endpoint.
  # Uses OpenRouter's free-route alias by default.
  default: openrouter_free
  providers:
    openrouter_free:
      type: openai
      api_key: ${OPENROUTER_API_KEY}
      base_url: https://openrouter.ai/api/v1
      model: openrouter/free
      tags: [cluster]
      # If a provider rejects json_object, set: json_response_format: json_schema
      connect_timeout_ms: 60000
      request_timeout_ms: 900000
      stream_first_token_timeout_ms: 300000
      stream_idle_timeout_ms: 60000

    # Backup: local OpenAI-compatible endpoint, e.g. mlx-server or vLLM.
    # Local/no-auth servers may leave api_key empty; cloud providers usually require one.
    # local_openai:
    #   type: openai
    #   api_key: ${LOCAL_OPENAI_API_KEY}
    #   base_url: ${LOCAL_OPENAI_BASE_URL}
    #   model: ${LOCAL_OPENAI_MODEL}
    #   connect_timeout_ms: 60000
    #   request_timeout_ms: 900000
    #   stream_first_token_timeout_ms: 300000
    #   stream_idle_timeout_ms: 60000

    # Backup: local Ollama models.
    # ollama_design:
    #   type: ollama
    #   base_url: ${OLLAMA_BASE_URL}
    #   model: ${OLLAMA_DESIGN_MODEL}
    #   request_timeout_ms: 900000
    #   stream_idle_timeout_ms: 300000
    #   think: false
    # ollama_code:
    #   type: ollama
    #   base_url: ${OLLAMA_BASE_URL}
    #   model: ${OLLAMA_CODE_MODEL}
    #   request_timeout_ms: 900000
    #   stream_idle_timeout_ms: 300000
    #   think: false

  # 角色 → provider 数组（兼容单字符串）。
  # 数组里的 provider 按 ScoreStore 有效评分降序使用；有效评分为用户覆盖优先，否则使用动态评分。
  # 默认只启用 OpenRouter；如需本地备选，取消 providers 中对应块注释并加入各角色数组。
  roles:
    Planner:   [openrouter_free]
    Architect: [openrouter_free]
    Coder:     [openrouter_free]
    Tester:    [openrouter_free]
    Debugger:  [openrouter_free]

  # 动态评分快照由 XCompiler 自动维护，落盘到同目录的 llm_scores.yaml，请勿手工编辑。
  # 用户手动指定 provider 分数时，请在 config.yaml 同目录创建 llm_scores_user.yaml；
  # 用户文件取值范围：0 表示禁用，0.1～1 表示固定覆盖动态优先级。
  # 这里仅保留为兼容初始值；旧配置里显式写 0 仍表示用户禁用。
  # tags: [cluster] 的聚合/路由 provider 默认动态评分范围为 0.2～0.5；
  # 可按需调整动态上下限（min 最低 0.1，max 最高 1.0）。用户覆盖文件不受 cluster 动态上限限制。
  cluster_score_min: 0.2
  cluster_score_max: 0.5
  scores: {}

  # 全局 fallback 链：默认不启用本地备选；如已取消 provider 注释，可设为 [local_openai] 或 [local_openai, ollama_code]。
  fallbacks: []
  role_fallbacks: {}

agent:
  max_steps: 50
  max_debug_retries: 3
  # Debugger 滑动窗口的硬上限：LLM 持续健康输出时窗口可扩到该值；
  # 出现解析失败/重复 actions/无进展时窗口快速收缩，连续 2 次低质量直接放弃。
  # 默认 = max(max_debug_retries * 4, 10)
  # max_debug_retries_cap: 12
  # EditGuard 单 Step 累计行数预算。auto 会按 phase/tools/outputs/prompt 上下文自适应；
  # 如需固定硬上限，可设为数字，例如 400。
  # max_edit_lines_per_step: auto
  # write_file / append_file 单次 content 字节预算。auto 会按 phase/tools/outputs/context 自适应；
  # 大型工程仍应拆成模块/函数/类边界增量写入，而不是单次写巨型文件。
  # max_write_chunk_bytes: auto
  # 目标工程语言由 topic / 现有工程基线判定：明确写 Python/TS 时自动选择；
  # 无法判断时在澄清阶段询问；非交互或 topic 模式仍无法判断则默认 Python。
  sandboxes:
    python:
      # subprocess | docker
      mode: subprocess
      local:
        sandbox_dir: .sandbox/python
        python_bin: python3
        # Keep provider keys and other host credentials out of generated project processes.
        # Set true only when the project explicitly requires the complete host environment.
        inherit_env: false
        limits:
          cpu: 1
          memory_mb: 1024
          wall_seconds: 60
          # download-only (default) | full
          #   subprocess cannot enforce network=off; use mode: docker for hard isolation
          #   download-only — outbound HTTP/HTTPS allowed, no inbound port publishing
          #   pypi-only     — legacy value, rejected because Docker cannot enforce a domain allowlist
          #   full          — also publishes expose_ports to 127.0.0.1 for host-side tests
          network: download-only
          # expose_ports: [8000]
      docker:
        image: python:3.11-slim
        workdir: /workspace
        pull: false
        docker_bin: docker
        extra_run_args: []
        sandbox_dir: .sandbox/python
        limits:
          cpu: 1
          memory_mb: 1024
          wall_seconds: 60
          network: download-only
          # expose_ports: [8000]

    typescript:
      mode: subprocess
      local:
        sandbox_dir: .sandbox/typescript
        inherit_env: false
        limits:
          cpu: 1
          memory_mb: 1024
          wall_seconds: 60
          network: download-only
          # expose_ports: [3000]
      docker:
        image: node:24-slim
        workdir: /workspace
        pull: false
        docker_bin: docker
        extra_run_args: []
        sandbox_dir: .sandbox/typescript
        limits:
          cpu: 1
          memory_mb: 1024
          wall_seconds: 60
          network: download-only
          # expose_ports: [3000]

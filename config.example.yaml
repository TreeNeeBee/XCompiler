llm:
  # 默认使用本地 ollama 上的 coder 模型
  default: ollama_code
  providers:
    # 设计/需求向：gemma4:31b（推理与结构化输出更稳）
    ollama_design:
      base_url: ${OLLAMA_BASE_URL}
      model: gemma4:31b
    # 编码/测试/调试向：qwen3-coder:30b
    ollama_code:
      base_url: ${OLLAMA_BASE_URL}
      model: qwen3-coder:30b
    # 备用：OpenAI 兼容
    openai:
      api_key: ${OPENAI_API_KEY}
      base_url: ${OPENAI_BASE_URL}
      model: gpt-4o-mini

  # 角色 → provider 路由
  roles:
    Planner: ollama_design     # 需求澄清/计划生成
    Architect: ollama_design   # 架构与 requirements.txt
    Coder: ollama_code         # 代码生成
    Tester: ollama_code        # 测试用例
    Debugger: ollama_code      # 调试与修复

agent:
  language: python
  max_steps: 50
  max_debug_retries: 3
  # subprocess | docker
  # subprocess (默认)：在嬿主机 venv 内直接 spawn，快但无隔离
  # docker: 使用系统 docker daemon，bind-mount 工程目录到容器；debug 时直接修改工程代码即生效
  sandbox: subprocess
  sandbox_limits:
    cpu: 1
    memory_mb: 1024
    wall_seconds: 60
    network: pypi-only
  sandbox_docker:
    image: python:3.11-slim
    workdir: /workspace
    pull: false
    docker_bin: docker
    extra_run_args: []

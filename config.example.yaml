locale: zh  # CLI / prompt 语言：en 或 zh

llm:
  # 默认使用本地 ollama 上的 coder 模型
  default: ollama_code
  providers:
    # 设计/需求向：gemma4:31b-mlx（推理与结构化输出更稳）
    ollama_design:
      base_url: ${OLLAMA_BASE_URL}
      model: gemma4:31b-mlx
      request_timeout_ms: 900000
      stream_idle_timeout_ms: 300000
      # 弱服务器生成大型结构化 JSON 时关闭长思考，避免正文首 token 等待数分钟。
      think: false
    # 编码/测试/调试向：qwen3.6:35b-mlx
    ollama_code:
      base_url: ${OLLAMA_BASE_URL}
      model: qwen3.6:35b-mlx
      request_timeout_ms: 900000
      stream_idle_timeout_ms: 300000
      think: false
    # 备用：OpenAI 兼容
    openai:
      api_key: ${OPENAI_API_KEY}
      base_url: ${OPENAI_BASE_URL}
      model: gpt-4o-mini
    # 本地 OpenAI-compatible 端点（例如 mlx-server /v1/chat/completions）
    # mlx_server:
    #   api_key: ""
    #   base_url: http://127.0.0.1:8080/v1
    #   model: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit

  # 角色 → provider 数组（兼容单字符串）。
  # 数组里的 provider 按 ScoreStore 评分降序使用，评分=0 自动跳过。
  # 启动期 preflight 会探活 ollama /api/tags：模型不在服务器上 → 评分置 0；
  # 若某角色全部候选都被置 0 → 自动从可达 ollama 服务器扫描 tags 并注入合成 provider。
  roles:
    Planner:   [ollama_design]
    Architect: [ollama_design]
    Coder:     [ollama_code]
    Tester:    [ollama_code]
    # Prefer a model different from Coder so debugging gets an independent reasoning path.
    Debugger:  [ollama_design, ollama_code]

  # 评分快照（preflight 与运行时自动维护，落盘到同目录的 llm_scores.yaml）。
  # 这里可以手工写初值；空 = 全部默认 1.0。
  scores: {}

agent:
  # python | typescript
  language: python
  max_steps: 50
  max_debug_retries: 3
  # Debugger 滑动窗口的硬上限：LLM 持续健康输出时窗口可扩到该值；
  # 出现解析失败/重复 actions/无进展时窗口快速收缩，连续 2 次低质量直接放弃。
  # 默认 = max(max_debug_retries * 4, 10)
  # max_debug_retries_cap: 12
  # subprocess | docker
  # subprocess (默认)：在嬿主机 venv 内直接 spawn，快但无隔离
  # docker: 使用系统 docker daemon，bind-mount 工程目录到容器；debug 时直接修改工程代码即生效
  sandbox: subprocess
  sandbox_limits:
    cpu: 1
    memory_mb: 1024
    wall_seconds: 60
    # off | download-only (default) | full
    #   download-only — outbound HTTP/HTTPS allowed, no inbound port publishing
    #   pypi-only     — legacy value, rejected because Docker cannot enforce a domain allowlist
    #   full          — also publishes `expose_ports` to 127.0.0.1 for testing
    #                   Python / Node network apps from the host side
    network: download-only
    # When network=full, container ports listed here are published on
    # 127.0.0.1:<port> so host-side tests can reach the running app.
    # expose_ports: [8000]
  sandbox_docker:
    # Default image is chosen from agent.language:
    #   python     -> python:3.11-slim
    #   typescript -> node:20-slim
    image: python:3.11-slim
    workdir: /workspace
    pull: false
    docker_bin: docker
    extra_run_args: []
